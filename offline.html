<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080808">
  <title>Sem conexao - Consultoria</title>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <style>
    :root {
      --bg: #080808;
      --card: #121212;
      --text: #f5f5f5;
      --muted: #a3a3a3;
      --primary: #a3e635;
      --border: rgba(255, 255, 255, 0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top right, rgba(163, 230, 53, 0.08), transparent 42%), var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      padding: 1rem;
    }
    .card {
      width: min(520px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.3rem;
    }
    h1 { margin: 0 0 .7rem; font-size: 1.2rem; }
    p { margin: 0 0 1rem; color: var(--muted); line-height: 1.5; }
    .actions { display: flex; gap: .6rem; flex-wrap: wrap; }
    .btn {
      appearance: none;
      border: 1px solid var(--primary);
      color: #0d0d0d;
      background: var(--primary);
      border-radius: 10px;
      padding: .65rem .9rem;
      font-weight: 700;
      text-decoration: none;
    }
    .btn.secondary {
      color: var(--text);
      background: transparent;
      border-color: var(--border);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Voce esta sem conexao</h1>
    <p>Sem internet no momento. Se voce ja abriu a plataforma antes, boa parte do app continua funcionando offline.</p>
    <div class="actions">
      <a class="btn" href="./index.html">Abrir area do aluno</a>
      <a class="btn secondary" href="./trainer.html">Abrir area do treinador</a>
    </div>
  </main>
</body>
</html>

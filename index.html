    <style>
        /* Improved Delete Button for History Items */
        .btn-delete-history {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            backdrop-filter: blur(4px);
        }

        .btn-delete-history:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.4);
            color: #ff4d4d;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2);
        }

        .btn-delete-history i {
            font-size: 1.2rem;
        }

        .history-workout-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.8rem;
        }

        /* Confirmation Modal Input Improvements */
        #confirmation-input {
            text-transform: lowercase;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            background: rgba(0, 0, 0, 0.2);
        }

        #confirmation-input:focus {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
            outline: none;
        }

        #confirmation-modal-confirm-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border: none;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            transition: all 0.3s ease;
        }

        #confirmation-modal-confirm-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
            filter: brightness(1.1);
        }

        /* Fix for background-clip */
        .summary-header h2 {
            background-clip: text;
            -webkit-background-clip: text;
        }

        /* Modal Base & Transitions */
        .perfil-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            /* Controlado por JS display: flex */
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 1rem;
        }

        .perfil-modal-overlay.active {
            opacity: 1;
        }

        .perfil-modal {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .perfil-modal-overlay.active .perfil-modal {
            transform: scale(1);
        }

        /* Shake Animation for wrong input */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            50% {
                transform: translateX(8px);
            }

            75% {
                transform: translateX(-8px);
            }
        }

        .shake-error {
            animation: shake 0.3s ease-in-out;
            border-color: #ef4444 !important;
        }
    </style>
</head>

<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QA Anamnese</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/assets/vendor/phosphor/phosphor-local.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    <div id="app" class="wide"></div>

    <script>
        const QUESTIONNAIRE_TABS = ['saude', 'nutricao', 'rotina', 'treino', 'metas'];
        const QUESTIONNAIRE_TAB_LABELS = {
            saude: 'Saúde',
            nutricao: 'Nutrição',
            rotina: 'Rotina',
            treino: 'Treino',
            metas: 'Metas'
        };

        function updateQuestionnaireProgress(tabName) {
            const currentIndex = Math.max(0, QUESTIONNAIRE_TABS.indexOf(tabName));
            const total = QUESTIONNAIRE_TABS.length;
            const percent = Math.round(((currentIndex + 1) / total) * 100);
            document.getElementById('q-step-label').textContent = `Etapa ${currentIndex + 1} de ${total} · ${QUESTIONNAIRE_TAB_LABELS[tabName] || ''}`;
            document.getElementById('q-progress-count').textContent = `${percent}%`;
            document.getElementById('q-progress-fill').style.width = `${percent}%`;
        }

        function switchQTab(tabName) {
            const resolvedTab = QUESTIONNAIRE_TABS.includes(tabName) ? tabName : QUESTIONNAIRE_TABS[0];
            document.querySelectorAll('.q-tab-content').forEach((tab) => tab.classList.remove('active'));
            document.querySelectorAll('.q-tab').forEach((btn) => {
                btn.classList.remove('active');
                btn.setAttribute('aria-selected', 'false');
            });
            document.getElementById(`q-tab-${resolvedTab}`)?.classList.add('active');
            const btn = document.getElementById(`btn-tab-${resolvedTab}`);
            btn?.classList.add('active');
            btn?.setAttribute('aria-selected', 'true');
            updateQuestionnaireProgress(resolvedTab);
            const screen = document.getElementById('student-questionnaire-screen');
            requestAnimationFrame(() => {
                screen?.scrollTo({ top: 0, behavior: 'auto' });
                screen?.scrollIntoView({ block: 'start', behavior: 'auto' });
            });
        }

        function toggleConditional(id, show) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.toggle('active', show);
            if (!show) {
                const input = el.querySelector('input');
                if (input) input.value = '';
            }
        }

        function normalizeText(value) {
            return String(value || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
        }

        function setQuestionnairePreset(id, value = '') {
            const el = document.getElementById(id);
            if (el) el.value = String(value || '');
        }

        function appendQuestionnairePreset(id, value = '') {
            const el = document.getElementById(id);
            if (!el || !value) return;
            const parts = String(el.value || '').split(/[,\n;]+/).map((item) => item.trim()).filter(Boolean);
            if (!parts.some((item) => normalizeText(item) === normalizeText(value))) parts.push(value);
            el.value = parts.join(', ');
        }

        function clearQuestionnaireChecks(name) {
            document.querySelectorAll(`input[name="${name}"]`).forEach((input) => {
                input.checked = false;
            });
        }

        function setQuestionnaireCheckboxValues(name, values = []) {
            const selected = new Set(values);
            document.querySelectorAll(`input[name="${name}"]`).forEach((input) => {
                input.checked = selected.has(input.value);
            });
        }

        function submitQuestionnaire() {
            document.body.dataset.qaSubmitted = 'true';
        }

        fetch('/pages/student-questionnaire.html', { cache: 'no-store' })
            .then((res) => res.text())
            .then((html) => {
                document.getElementById('app').innerHTML = html;
                document.getElementById('student-questionnaire-screen')?.classList.add('active');
                switchQTab('saude');
            });
    </script>
</body>

</html>

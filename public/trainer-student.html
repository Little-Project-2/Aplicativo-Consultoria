<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pagina dedicada do aluno no painel do treinador.">
    <meta name="theme-color" content="#98E52B">
    <title>Treinador | Perfil do Aluno</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/vendor/phosphor/phosphor-local.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sp-bg-0: #070b0d;
            --sp-bg-1: #0d1216;
            --sp-bg-2: #121920;
            --sp-surface-1: rgba(255, 255, 255, 0.03);
            --sp-surface-2: rgba(255, 255, 255, 0.06);
            --sp-text-main: #edf4ef;
            --sp-text-muted: #9fafa8;
            --sp-accent: #98e52b;
            --sp-accent-soft: rgba(152, 229, 43, 0.2);
            --sp-border-soft: rgba(255, 255, 255, 0.12);
            --sp-border-strong: rgba(255, 255, 255, 0.2);
            --sp-danger: #fb7185;
            --sp-shadow-1: 0 16px 34px rgba(0, 0, 0, 0.34);
            --sp-shadow-2: 0 26px 62px rgba(0, 0, 0, 0.42);
            --sp-radius-sm: 12px;
            --sp-radius-md: 18px;
            --sp-radius-lg: 24px;
            --sp-motion-fast: 170ms;
            --sp-motion-base: 280ms;
            --sp-ease: cubic-bezier(0.22, 0.85, 0.25, 1);
            --sp-focus: 0 0 0 3px rgba(152, 229, 43, 0.34);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            min-height: 100dvh;
        }

        body {
            font-family: "Manrope", "Segoe UI", sans-serif;
            color: var(--sp-text-main);
            background:
                radial-gradient(860px 520px at 88% -10%, rgba(152, 229, 43, 0.14), transparent 60%),
                radial-gradient(720px 440px at 0% 105%, rgba(37, 183, 140, 0.12), transparent 66%),
                linear-gradient(152deg, #070b0d 0%, #0b1116 35%, #101922 100%);
        }

        .student-page {
            width: 100vw;
            min-height: 100dvh;
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            overflow: hidden;
            border: 1px solid var(--sp-border-soft);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.018), rgba(255, 255, 255, 0)),
                var(--sp-bg-0);
            box-shadow: var(--sp-shadow-2);
        }

        .student-sidebar {
            height: 100dvh;
            padding: 1rem 0.85rem;
            overflow-y: auto;
            border-right: 1px solid var(--sp-border-soft);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
                rgba(6, 11, 13, 0.88);
            display: grid;
            grid-template-rows: auto auto minmax(0, 1fr);
            gap: 0.9rem;
        }

        .student-sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .student-sidebar::-webkit-scrollbar-thumb {
            border-radius: 999px;
            background: rgba(152, 229, 43, 0.24);
        }

        .student-sidebar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.04);
        }

        .student-back-btn {
            width: 100%;
            min-height: 42px;
            border-radius: 999px;
            border: 1px solid var(--sp-border-soft);
            background: rgba(255, 255, 255, 0.03);
            color: var(--sp-text-main);
            font-weight: 700;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: transform var(--sp-motion-fast) var(--sp-ease), border-color var(--sp-motion-fast) var(--sp-ease), background var(--sp-motion-fast) var(--sp-ease);
        }

        .student-back-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(152, 229, 43, 0.4);
            background: rgba(152, 229, 43, 0.12);
        }

        .student-profile {
            border: 1px solid var(--sp-border-soft);
            border-radius: var(--sp-radius-md);
            background: linear-gradient(155deg, rgba(152, 229, 43, 0.14), rgba(255, 255, 255, 0.02) 54%, rgba(255, 255, 255, 0.01));
            padding: 0.9rem 0.74rem;
            display: grid;
            justify-items: center;
            text-align: center;
            gap: 0.4rem;
            box-shadow: var(--sp-shadow-1);
        }

        .student-avatar {
            width: 72px;
            height: 72px;
            border-radius: 22px;
            border: 1px solid rgba(152, 229, 43, 0.44);
            background: linear-gradient(145deg, rgba(152, 229, 43, 0.24), rgba(152, 229, 43, 0.08));
            display: grid;
            place-content: center;
            font-family: "Space Grotesk", "Manrope", sans-serif;
            font-size: 1.26rem;
            font-weight: 700;
            color: #f1ffd9;
            letter-spacing: 0.02em;
        }

        .student-name {
            margin: 0;
            font-family: "Space Grotesk", "Manrope", sans-serif;
            font-size: 1.04rem;
            line-height: 1.16;
        }

        .student-meta {
            margin: 0;
            color: var(--sp-text-muted);
            font-size: 0.78rem;
            line-height: 1.35;
        }

        .student-badge {
            border: 1px solid var(--sp-border-soft);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.035);
            color: #dce8e2;
            padding: 0.26rem 0.56rem;
            font-size: 0.74rem;
            font-weight: 700;
        }

        .student-nav {
            display: grid;
            gap: 0.82rem;
            align-content: start;
        }

        .student-nav-group {
            display: grid;
            gap: 0.42rem;
        }

        .student-nav-group+.student-nav-group {
            margin-top: 0.1rem;
            padding-top: 0.78rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .student-nav-group-title {
            margin: 0;
            padding: 0 0.52rem;
            color: rgba(168, 180, 174, 0.9);
            font-size: 0.64rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .student-nav-group-toggle {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.6rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.018);
            color: rgba(175, 188, 181, 0.95);
            text-align: left;
            padding: 0.42rem 0.52rem;
            cursor: pointer;
            transition: border-color var(--sp-motion-fast) var(--sp-ease), background var(--sp-motion-fast) var(--sp-ease), color var(--sp-motion-fast) var(--sp-ease);
        }

        .student-nav-group-toggle .student-nav-group-title {
            padding: 0;
        }

        .student-nav-group-toggle:hover {
            border-color: rgba(152, 229, 43, 0.22);
            background: rgba(152, 229, 43, 0.08);
            color: #edf4ef;
        }

        .student-nav-group-chevron {
            width: 22px;
            height: 22px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.02);
            display: grid;
            place-items: center;
            color: rgba(195, 207, 202, 0.92);
            transition: transform var(--sp-motion-fast) var(--sp-ease), border-color var(--sp-motion-fast) var(--sp-ease), background var(--sp-motion-fast) var(--sp-ease);
        }

        .student-nav-group.is-collapsed .student-nav-group-chevron {
            transform: rotate(-90deg);
        }

        .student-nav-group-list {
            display: grid;
            gap: 0.34rem;
            overflow: hidden;
            max-height: 640px;
            opacity: 1;
            transition: max-height var(--sp-motion-base) var(--sp-ease), opacity var(--sp-motion-fast) var(--sp-ease), transform var(--sp-motion-fast) var(--sp-ease);
            transform-origin: top;
        }

        .student-nav-group.is-collapsed .student-nav-group-list {
            max-height: 0;
            opacity: 0;
            transform: translateY(-2px);
        }

        .student-nav-btn {
            position: relative;
            width: 100%;
            min-height: 52px;
            border-radius: var(--sp-radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.016);
            color: #d3ded9;
            font-size: 0.83rem;
            font-weight: 600;
            text-align: left;
            padding: 0.58rem 0.66rem;
            display: grid;
            grid-template-columns: 26px minmax(0, 1fr);
            align-items: center;
            gap: 0.56rem;
            cursor: pointer;
            transition: transform var(--sp-motion-fast) var(--sp-ease), border-color var(--sp-motion-fast) var(--sp-ease), background var(--sp-motion-fast) var(--sp-ease), color var(--sp-motion-fast) var(--sp-ease);
        }

        .student-nav-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(152, 229, 43, 0.22);
            background: rgba(152, 229, 43, 0.08);
            color: #edf4ef;
        }

        .student-nav-icon {
            width: 26px;
            height: 26px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            color: rgba(193, 205, 199, 0.9);
            transition: color var(--sp-motion-fast) var(--sp-ease), border-color var(--sp-motion-fast) var(--sp-ease), background var(--sp-motion-fast) var(--sp-ease);
        }

        .student-nav-icon i {
            font-size: 0.96rem;
            line-height: 1;
        }

        .student-nav-copy {
            min-width: 0;
            display: grid;
            gap: 0.08rem;
        }

        .student-nav-copy strong {
            display: block;
            margin: 0;
            font-size: 0.86rem;
            font-weight: 800;
            letter-spacing: 0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .student-nav-copy small {
            display: block;
            margin: 0;
            color: rgba(168, 179, 174, 0.86);
            font-size: 0.68rem;
            font-weight: 600;
            line-height: 1.22;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .student-nav-btn.active {
            border-color: rgba(152, 229, 43, 0.44);
            background: linear-gradient(115deg, rgba(152, 229, 43, 0.22), rgba(152, 229, 43, 0.09));
            color: #ecffd3;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .student-nav-btn.active .student-nav-icon {
            border-color: rgba(152, 229, 43, 0.42);
            background: rgba(152, 229, 43, 0.2);
            color: #f1ffd8;
        }

        .student-nav-btn.active .student-nav-copy small {
            color: rgba(227, 245, 214, 0.9);
        }

        .student-main {
            height: 100dvh;
            overflow-y: auto;
            padding: 1.35rem;
        }

        .student-main-empty {
            min-height: calc(100dvh - 2.7rem);
        }

        .student-main-header {
            border: 1px solid var(--sp-border-soft);
            border-radius: var(--sp-radius-lg);
            background: linear-gradient(170deg, rgba(152, 229, 43, 0.12), rgba(255, 255, 255, 0.02) 55%, rgba(255, 255, 255, 0.01));
            padding: 1rem 1.05rem;
            margin-bottom: 0.9rem;
            box-shadow: var(--sp-shadow-1);
        }

        .student-main-header h1 {
            margin: 0;
            font-family: "Space Grotesk", "Manrope", sans-serif;
            font-size: clamp(1.42rem, 1.2vw + 1rem, 1.9rem);
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        .student-main-header p {
            margin: 0.45rem 0 0;
            color: var(--sp-text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            max-width: 72ch;
        }

        .student-alert {
            margin-bottom: 0.9rem;
            border: 1px solid rgba(251, 113, 133, 0.44);
            border-radius: var(--sp-radius-sm);
            background: rgba(251, 113, 133, 0.1);
            color: #ffcfda;
            padding: 0.72rem 0.82rem;
            font-size: 0.82rem;
            font-weight: 700;
        }

        .student-placeholder-grid {
            display: grid;
            grid-template-columns: repeat(12, minmax(0, 1fr));
            gap: 0.72rem;
        }

        .student-placeholder-card {
            grid-column: span 4;
            border: 1px solid var(--sp-border-soft);
            border-radius: var(--sp-radius-md);
            background: linear-gradient(170deg, var(--sp-surface-2), var(--sp-surface-1));
            min-height: 168px;
            padding: 0.84rem;
            box-shadow: var(--sp-shadow-1);
            display: grid;
            gap: 0.44rem;
            align-content: start;
            transition: transform var(--sp-motion-base) var(--sp-ease), border-color var(--sp-motion-base) var(--sp-ease);
        }

        .student-placeholder-card:hover {
            transform: translateY(-2px);
            border-color: rgba(152, 229, 43, 0.3);
        }

        .student-placeholder-card h3 {
            margin: 0;
            font-size: 0.95rem;
            font-family: "Space Grotesk", "Manrope", sans-serif;
            letter-spacing: -0.01em;
        }

        .student-placeholder-card p {
            margin: 0;
            color: var(--sp-text-muted);
            font-size: 0.78rem;
            line-height: 1.48;
        }

        .student-placeholder-line {
            border-radius: 999px;
            height: 8px;
            width: 100%;
            border: 1px solid rgba(152, 229, 43, 0.24);
            background: linear-gradient(90deg, rgba(152, 229, 43, 0.2), rgba(255, 255, 255, 0.03));
        }

        .student-placeholder-line.short {
            width: 64%;
        }

        @media (max-width: 1180px) {
            .student-placeholder-card {
                grid-column: span 6;
            }
        }

        @media (max-width: 960px) {
            .student-page {
                grid-template-columns: 1fr;
            }

            .student-sidebar {
                height: min(72dvh, 560px);
                border-right: none;
                border-bottom: 1px solid var(--sp-border-soft);
                position: sticky;
                top: 0;
                z-index: 20;
                background: rgba(6, 11, 13, 0.96);
                backdrop-filter: blur(10px);
            }

            .student-nav {
                display: grid;
                gap: 0.74rem;
            }

            .student-nav-btn {
                min-width: 0;
            }

            .student-nav-copy small {
                white-space: normal;
            }

            .student-main {
                height: auto;
                min-height: calc(100dvh - 250px);
                padding: 1rem;
            }

            .student-placeholder-card {
                grid-column: span 12;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition-duration: 0.01ms !important;
                transition-delay: 0ms !important;
            }
        }

        button:focus-visible {
            outline: none;
            box-shadow: var(--sp-focus);
        }
    </style>
</head>

<body>
    <div class="student-page">
        <aside class="student-sidebar">
            <button id="student-back-btn" class="student-back-btn" type="button">Voltar para Alunos</button>

            <section class="student-profile" aria-label="Perfil do aluno">
                <div id="student-avatar" class="student-avatar">AL</div>
                <h2 id="student-name" class="student-name">Aluno</h2>
                <p id="student-meta" class="student-meta">Dados do aluno indisponíveis</p>
                <span id="student-payment-badge" class="student-badge">Sem pagamento</span>
            </section>

            <nav id="student-nav" class="student-nav" aria-label="Menu principal do aluno"></nav>
        </aside>

        <main class="student-main">
            <section id="student-main-empty" class="student-main-empty" aria-live="polite"></section>
        </main>
    </div>

    <script>
        /** @typedef {'geral'|'deft'|'checkin'|'dieta'|'refeicoes'|'treino'|'cardio'|'ficha'|'dados'|'pgto'|'periodos'|'chat'} StudentPageTab */
        /** @typedef {'operacao'|'planejamento'|'gestao'} StudentSidebarGroup */
        /** @typedef {{key:StudentPageTab, label:string, subtitle:string, icon:string, group:StudentSidebarGroup}} StudentPageNavItem */
        /** @typedef {{studentId:string, tab:StudentPageTab}} StudentPageRouteState */

        (() => {
            const STORAGE_KEYS = {
                studentsV2: 'trainer_v2_students',
                studentsLegacy: 'trainerStudents'
            };

            /** @type {StudentPageNavItem[]} */
            const STUDENT_PAGE_TABS = [
                { key: 'geral', label: 'Geral', subtitle: 'Visão principal', icon: 'ph-house-line', group: 'operacao' },
                { key: 'checkin', label: 'Check-In', subtitle: 'Acompanhamento', icon: 'ph-clipboard-text', group: 'operacao' },
                { key: 'chat', label: 'Chat', subtitle: 'Comunicação', icon: 'ph-chat-teardrop-text', group: 'operacao' },
                { key: 'deft', label: 'Déft', subtitle: 'Estratégia metabólica', icon: 'ph-calculator', group: 'planejamento' },
                { key: 'dieta', label: 'Dieta', subtitle: 'Plano alimentar', icon: 'ph-apple-logo', group: 'planejamento' },
                { key: 'refeicoes', label: 'Refeições', subtitle: 'Distribuição diária', icon: 'ph-fork-knife', group: 'planejamento' },
                { key: 'treino', label: 'Treino', subtitle: 'Prescrição', icon: 'ph-barbell', group: 'planejamento' },
                { key: 'cardio', label: 'Cardio', subtitle: 'Planejamento semanal', icon: 'ph-heartbeat', group: 'planejamento' },
                { key: 'ficha', label: 'Ficha', subtitle: 'Anamnese', icon: 'ph-file-text', group: 'gestao' },
                { key: 'dados', label: 'Dados', subtitle: 'Métricas e histórico', icon: 'ph-chart-line-up', group: 'gestao' },
                { key: 'pgto', label: 'Pgto', subtitle: 'Financeiro', icon: 'ph-wallet', group: 'gestao' },
                { key: 'periodos', label: 'Períodos', subtitle: 'Ciclos ativos', icon: 'ph-calendar-blank', group: 'gestao' }
            ];

            const STUDENT_NAV_GROUPS = [
                { key: 'operacao', label: 'OPERACAO', collapsible: false },
                { key: 'planejamento', label: 'PLANEJAMENTO', collapsible: true },
                { key: 'gestao', label: 'GESTAO', collapsible: true }
            ];

            const TAB_KEYS = STUDENT_PAGE_TABS.map((tab) => tab.key);
            const state = {
                students: [],
                /** @type {StudentPageRouteState} */
                route: { studentId: '', tab: 'geral' },
                collapsedGroups: {
                    planejamento: false,
                    gestao: false
                }
            };

            function readStorageJson(key, fallbackValue) {
                try {
                    const raw = localStorage.getItem(key);
                    if (!raw) return fallbackValue;
                    const parsed = JSON.parse(raw);
                    return parsed ?? fallbackValue;
                } catch (error) {
                    console.warn('Falha ao ler storage', key, error);
                    return fallbackValue;
                }
            }

            function sanitizeText(value, maxLen = 240) {
                return String(value || '').trim().slice(0, maxLen);
            }

            function escHtml(value) {
                return String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function normalizeStudentPageTab(tabLike) {
                const safe = String(tabLike || '').trim().toLowerCase().replace(/[^a-z]/g, '');
                return TAB_KEYS.includes(safe) ? safe : 'geral';
            }

            function getGroupByKey(groupKey) {
                return STUDENT_NAV_GROUPS.find((group) => group.key === groupKey) || null;
            }

            function getGroupKeyForTab(tabKey) {
                const found = STUDENT_PAGE_TABS.find((tab) => tab.key === tabKey);
                return found ? found.group : 'operacao';
            }

            function decodeHashPart(value) {
                try {
                    return decodeURIComponent(String(value || ''));
                } catch (error) {
                    return String(value || '');
                }
            }

            function parseStudentPageHash() {
                const normalizedHash = String(window.location.hash || '').replace(/^#\/?/, '');
                const parts = normalizedHash.split('/').filter(Boolean);
                const base = String(parts[0] || '').trim().toLowerCase();
                const studentId = sanitizeText(decodeHashPart(parts[1] || ''), 90);
                const tab = normalizeStudentPageTab(parts[2] || 'geral');

                if (base !== 'aluno') {
                    return { studentId: '', tab: 'geral' };
                }
                return { studentId, tab };
            }

            function buildStudentRouteHash(studentId, tab) {
                const safeId = sanitizeText(studentId, 90) || 'desconhecido';
                const safeTab = normalizeStudentPageTab(tab);
                return `#/aluno/${encodeURIComponent(safeId)}/${safeTab}`;
            }

            function getInitials(name) {
                const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
                if (!parts.length) return 'AL';
                if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
                return `${parts[0][0] || ''}${parts[1][0] || ''}`.toUpperCase();
            }

            function loadStudents() {
                const v2Students = readStorageJson(STORAGE_KEYS.studentsV2, null);
                if (Array.isArray(v2Students) && v2Students.length) return v2Students;
                const legacyStudents = readStorageJson(STORAGE_KEYS.studentsLegacy, null);
                if (Array.isArray(legacyStudents) && legacyStudents.length) return legacyStudents;
                return [];
            }

            function getStudentById(studentId) {
                const safeId = sanitizeText(studentId, 90);
                if (!safeId) return null;
                return state.students.find((student) => String(student?.id || '').trim() === safeId) || null;
            }

            function buildMetaLine(student) {
                const ageRaw = student?.age ?? student?.idade;
                const weightRaw = student?.weight ?? student?.peso;
                const age = ageRaw === undefined || ageRaw === null ? '' : sanitizeText(ageRaw, 12);
                const weight = weightRaw === undefined || weightRaw === null ? '' : sanitizeText(weightRaw, 16);

                const parts = [];
                if (age) parts.push(`${age} anos`);
                if (weight) parts.push(`${weight}kg`);

                if (!parts.length) {
                    const email = sanitizeText(student?.email || '', 90);
                    if (email) return email;
                    return 'Sem idade/peso cadastrados';
                }
                return parts.join(' • ');
            }

            function buildPaymentBadge(student) {
                const source = sanitizeText(student?.paymentStatus || student?.statusPagamento || '', 40).toLowerCase();
                if (!source) return 'Sem pagamento';
                if (source.includes('pago') || source.includes('ativo') || source.includes('ok')) return 'Pagamento em dia';
                if (source.includes('atraso') || source.includes('pendente')) return 'Pagamento pendente';
                return sanitizeText(student?.paymentStatus || student?.statusPagamento || 'Sem pagamento', 40);
            }

            function renderProfile(student) {
                const nameEl = document.getElementById('student-name');
                const metaEl = document.getElementById('student-meta');
                const avatarEl = document.getElementById('student-avatar');
                const badgeEl = document.getElementById('student-payment-badge');
                if (!nameEl || !metaEl || !avatarEl || !badgeEl) return;

                if (!student) {
                    nameEl.textContent = 'Aluno não encontrado';
                    metaEl.textContent = 'Verifique o aluno selecionado na lista.';
                    avatarEl.textContent = '??';
                    badgeEl.textContent = 'Sem pagamento';
                    return;
                }

                const safeName = sanitizeText(student.name || 'Aluno', 90) || 'Aluno';
                nameEl.textContent = safeName;
                metaEl.textContent = buildMetaLine(student);
                avatarEl.textContent = getInitials(safeName);
                badgeEl.textContent = buildPaymentBadge(student);
            }

            function renderStudentNav() {
                const nav = document.getElementById('student-nav');
                if (!nav) return;
                nav.innerHTML = STUDENT_NAV_GROUPS.map((group) => {
                    const groupItems = STUDENT_PAGE_TABS.filter((tab) => tab.group === group.key);
                    if (!groupItems.length) return '';
                    const isCollapsed = group.collapsible ? Boolean(state.collapsedGroups[group.key]) : false;
                    const itemsHtml = groupItems.map((tab) => `
                        <button
                            type="button"
                            class="student-nav-btn ${state.route.tab === tab.key ? 'active' : ''}"
                            data-student-tab="${tab.key}"
                            aria-current="${state.route.tab === tab.key ? 'page' : 'false'}">
                            <span class="student-nav-icon" aria-hidden="true"><i class="ph-bold ${escHtml(tab.icon)}"></i></span>
                            <span class="student-nav-copy">
                                <strong>${escHtml(tab.label)}</strong>
                                <small>${escHtml(tab.subtitle)}</small>
                            </span>
                        </button>
                    `).join('');
                    const headingHtml = group.collapsible
                        ? `
                            <button
                                type="button"
                                class="student-nav-group-toggle"
                                data-group-toggle="${escHtml(group.key)}"
                                aria-expanded="${isCollapsed ? 'false' : 'true'}"
                                aria-controls="student-nav-group-list-${escHtml(group.key)}">
                                <span class="student-nav-group-title">${escHtml(group.label)}</span>
                                <span class="student-nav-group-chevron" aria-hidden="true">
                                    <i class="ph-bold ph-caret-down"></i>
                                </span>
                            </button>
                        `
                        : `<h3 class="student-nav-group-title">${escHtml(group.label)}</h3>`;
                    return `
                        <section class="student-nav-group ${isCollapsed ? 'is-collapsed' : ''}" aria-label="${escHtml(group.label)}">
                            ${headingHtml}
                            <div id="student-nav-group-list-${escHtml(group.key)}" class="student-nav-group-list">
                                ${itemsHtml}
                            </div>
                        </section>
                    `;
                }).join('');
            }

            function renderStudentPagePlaceholder(tab) {
                const emptyContent = document.getElementById('student-main-empty');
                if (!emptyContent) return;
                emptyContent.textContent = '';
            }

            function setStudentRoute(studentId, tab) {
                const nextHash = buildStudentRouteHash(studentId, tab);
                if (window.location.hash !== nextHash) {
                    window.location.hash = nextHash;
                    return;
                }
                state.route = {
                    studentId: sanitizeText(studentId, 90),
                    tab: normalizeStudentPageTab(tab)
                };
                render();
            }

            function switchStudentPageTab(tab) {
                const safeTab = normalizeStudentPageTab(tab);
                setStudentRoute(state.route.studentId, safeTab);
            }

            function syncStudentDetailFromHash() {
                const parsed = parseStudentPageHash();
                const fallbackStudentId = state.students[0]?.id ? String(state.students[0].id) : 'desconhecido';
                const resolvedStudentId = sanitizeText(parsed.studentId, 90) || fallbackStudentId;
                const resolvedTab = normalizeStudentPageTab(parsed.tab || 'geral');
                const expectedHash = buildStudentRouteHash(resolvedStudentId, resolvedTab);

                state.route = {
                    studentId: resolvedStudentId,
                    tab: resolvedTab
                };

                const activeGroupKey = getGroupKeyForTab(resolvedTab);
                const activeGroup = getGroupByKey(activeGroupKey);
                if (activeGroup?.collapsible && Object.prototype.hasOwnProperty.call(state.collapsedGroups, activeGroupKey)) {
                    state.collapsedGroups[activeGroupKey] = false;
                }

                if (window.location.hash !== expectedHash) {
                    window.location.hash = expectedHash;
                    return;
                }

                render();
            }

            function render() {
                const selectedStudent = getStudentById(state.route.studentId);
                renderProfile(selectedStudent);
                renderStudentNav();
                renderStudentPagePlaceholder(state.route.tab);
            }

            function bindEvents() {
                document.getElementById('student-back-btn')?.addEventListener('click', () => {
                    window.location.href = 'trainer.html#/alunos';
                });

                document.getElementById('student-nav')?.addEventListener('click', (event) => {
                    const groupToggle = event.target.closest('[data-group-toggle]');
                    if (groupToggle) {
                        const groupKey = sanitizeText(groupToggle.getAttribute('data-group-toggle') || '', 40);
                        const groupMeta = getGroupByKey(groupKey);
                        if (groupMeta?.collapsible && Object.prototype.hasOwnProperty.call(state.collapsedGroups, groupKey)) {
                            state.collapsedGroups[groupKey] = !state.collapsedGroups[groupKey];
                            renderStudentNav();
                        }
                        return;
                    }

                    const button = event.target.closest('[data-student-tab]');
                    if (!button) return;
                    switchStudentPageTab(button.getAttribute('data-student-tab') || 'geral');
                });

                window.addEventListener('hashchange', () => {
                    syncStudentDetailFromHash();
                });
            }

            function init() {
                state.students = loadStudents();
                bindEvents();
                syncStudentDetailFromHash();
            }

            init();
        })();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080808" />
    <title>Você está offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at top, rgba(163, 230, 53, 0.08), transparent 55%), #080808;
        color: #f5f5f7;
        display: grid;
        place-items: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
      }
      .card {
        max-width: 520px;
        background: rgba(18, 18, 20, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 2.5rem 2rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.6rem;
      }
      p {
        margin: 0 0 1.5rem;
        color: #b9bac4;
        line-height: 1.5;
      }
      button {
        background: #a3e635;
        color: #0d0d0d;
        border: none;
        border-radius: 999px;
        padding: 0.75rem 1.6rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Você está offline</h1>
      <p>Sem conexão no momento. Assim que a internet voltar, você poderá continuar usando o aplicativo normalmente.</p>
      <button onclick="window.location.reload()">Tentar novamente</button>
    </div>
  </body>
</html>

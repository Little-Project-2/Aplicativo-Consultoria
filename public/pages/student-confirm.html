<div id="student-confirm-screen" class="screen">
    <div class="student-login-container student-confirm-container">
        <div id="confirm-trainer-avatar" class="logo-icon inactive-icon student-confirm-avatar">
            <i class="ph-bold ph-user"></i>
        </div>
        <p id="confirm-trainer-question" class="subtitle student-confirm-question">Convite para entrar na consultoria</p>
        <h2 id="confirm-trainer-name" class="student-confirm-name">Treinador</h2>
        <p id="confirm-consultoria-name" class="subtitle student-confirm-consultoria">Consultoria</p>
        <p id="confirm-trainer-code" class="subtitle student-confirm-code">Codigo: 00000</p>
        <p id="confirm-trainer-helper" class="student-confirm-helper">Ao continuar, sua conta de aluno sera vinculada automaticamente.</p>

        <button id="confirm-connection-btn" class="btn-primary" onclick="confirmConnection()" style="margin-bottom: 1rem;">Entrar na consultoria</button>
        <button id="confirm-back-btn" class="btn-link" onclick="rejectTrainerConnectionCandidate()">Tenho outro convite</button>
    </div>
</div>

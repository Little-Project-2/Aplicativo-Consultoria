<div id="profile-create-screen" class="screen auth-screen">
    <div class="auth-bg-layer">
        <div class="auth-orb auth-orb-a"></div>
        <div class="auth-orb auth-orb-b"></div>
        <div class="auth-grid"></div>
    </div>

    <button class="btn-back auth-back" onclick="goToGlobalLogin()">
        <i class="ph-bold ph-arrow-left"></i> Voltar
    </button>

    <section class="auth-shell">
        <article class="auth-card auth-card-signup">
            <header class="auth-header">
                <div class="auth-brand-badge"><i class="ph-bold ph-user-plus"></i></div>
                <p class="auth-kicker">Criacao de conta</p>
                <h2 class="auth-title">Crie sua conta profissional</h2>
                <p class="auth-subtitle">Voce podera entrar como treinador, aluno ou ambos.</p>
            </header>

            <p id="signup-inline-feedback" class="auth-inline-feedback" style="display:none;"></p>

            <form class="auth-form" id="signup-form" onsubmit="event.preventDefault(); handleProfileCreation();">
                <div class="auth-field">
                    <label class="auth-field-label" for="reg-name">Nome completo</label>
                    <div class="auth-input-shell">
                        <i class="ph-bold ph-user auth-field-icon"></i>
                        <input type="text" id="reg-name" placeholder="Ex: Nicolas Silveira" required autocomplete="name">
                    </div>
                </div>

                <div class="auth-field">
                    <label class="auth-field-label" for="reg-email">E-mail</label>
                    <div class="auth-input-shell">
                        <i class="ph-bold ph-envelope auth-field-icon"></i>
                        <input type="email" id="reg-email" placeholder="seu@email.com" required autocomplete="email" inputmode="email">
                    </div>
                </div>

                <div class="auth-field">
                    <label class="auth-field-label" for="reg-pass">Criar senha</label>
                    <div class="auth-input-shell">
                        <i class="ph-bold ph-password auth-field-icon"></i>
                        <input type="password" id="reg-pass" placeholder="Minimo 8 caracteres" required minlength="8" autocomplete="new-password">
                    </div>
                </div>

                <div class="auth-field">
                    <label class="auth-field-label" for="reg-pass-confirm">Confirmar senha</label>
                    <div class="auth-input-shell">
                        <i class="ph-bold ph-password auth-field-icon"></i>
                        <input type="password" id="reg-pass-confirm" placeholder="Repita sua senha" required minlength="8" autocomplete="new-password">
                    </div>
                </div>

                <div class="auth-section">
                    <p class="auth-section-label">Voce e</p>
                    <div class="auth-role-grid">
                        <label class="auth-role-card">
                            <input type="radio" name="reg-role" value="student" checked>
                            <div class="auth-role-content">
                                <i class="ph-bold ph-barbell"></i>
                                <span class="auth-role-title">Aluno</span>
                                <small>Receber plano e acompanhamento</small>
                            </div>
                        </label>

                        <label class="auth-role-card">
                            <input type="radio" name="reg-role" value="trainer">
                            <div class="auth-role-content">
                                <i class="ph-bold ph-clipboard-text"></i>
                                <span class="auth-role-title">Treinador</span>
                                <small>Gerenciar alunos e consultoria</small>
                            </div>
                        </label>

                        <label class="auth-role-card auth-role-card-wide">
                            <input type="radio" name="reg-role" value="both">
                            <div class="auth-role-content">
                                <i class="ph-bold ph-arrows-left-right"></i>
                                <span class="auth-role-title">Ambos</span>
                                <small>Usar os dois contextos na mesma conta</small>
                            </div>
                        </label>
                    </div>
                </div>

                <label class="checkbox-wrapper auth-terms">
                    <input type="checkbox" id="reg-terms" required>
                    <span class="checkmark"></span>
                    <span>Aceito os Termos de Uso e Privacidade</span>
                </label>

                <button type="submit" class="btn-primary auth-submit" id="signup-submit-btn">
                    <span id="signup-btn-text">Criar conta</span>
                    <span id="signup-btn-spinner" class="auth-btn-spinner" style="display:none;"></span>
                </button>
            </form>
        </article>
    </section>
</div>

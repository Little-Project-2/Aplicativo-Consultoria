<div id="profile-create-screen" class="screen">
    <button class="btn-back" onclick="goToGlobalLogin()">
        <i class="ph-bold ph-arrow-left"></i> Voltar
    </button>

    <div class="student-login-container">
        <div class="logo-icon glow lg">
            <i class="ph-bold ph-user-plus"></i>
        </div>
        <h2>Criar sua Conta</h2>
        <p class="subtitle">Rápido, seguro e gratuito</p>

        <!-- Success Banner (shown after sign-up email is sent) -->
        <div id="signup-success-banner" style="display:none; margin-bottom:1rem; padding:1rem; border-radius:14px;
            background:rgba(57,255,20,0.08); border:1px solid rgba(57,255,20,0.3); color:#39ff14;
            font-size:0.9rem; font-weight:500; text-align:center; line-height:1.5;">
            <i class="ph-bold ph-envelope-open" style="font-size:1.5rem; display:block; margin-bottom:0.4rem;"></i>
            <strong>Conta criada!</strong><br>
            Verifique sua caixa de entrada e clique no link de confirmação para ativar sua conta.
        </div>

        <!-- Error Banner -->
        <div id="signup-error-banner" style="display:none; margin-bottom:1rem; padding:0.8rem 1rem; border-radius:12px;
            background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.35); color:#fc8181;
            font-size:0.875rem; font-weight:500; display:none; align-items:center; gap:0.5rem;">
            <i class="ph-bold ph-warning-circle" style="flex-shrink:0;"></i>
            <span id="signup-error-text">Erro desconhecido.</span>
        </div>

        <form class="login-form" id="signup-form" onsubmit="event.preventDefault(); handleProfileCreation();">
            <div class="input-group">
                <label for="reg-name">NOME COMPLETO</label>
                <input type="text" id="reg-name" placeholder="Ex: Nicolas Silveira" required autocomplete="name">
            </div>
            <div class="input-group">
                <label for="reg-email">E-MAIL</label>
                <input type="email" id="reg-email" placeholder="seu@email.com" required autocomplete="email" inputmode="email">
            </div>
            <div class="input-group">
                <label for="reg-pass">CRIAR SENHA</label>
                <input type="password" id="reg-pass" placeholder="Mínimo 8 caracteres" required minlength="8" autocomplete="new-password">
                <small style="font-size:0.72rem;color:var(--text-muted);margin-top:0.35rem;display:block;">Use letras e números para maior segurança.</small>
            </div>
            <div class="input-group">
                <label for="reg-pass-confirm">CONFIRMAR SENHA</label>
                <input type="password" id="reg-pass-confirm" placeholder="Repita sua senha" required minlength="8" autocomplete="new-password">
            </div>

            <div class="input-group">
                <label>VOCÊ É:</label>
                <div class="radio-group">
                    <label class="radio-card">
                        <input type="radio" name="reg-role" value="aluno" checked>
                        <div class="radio-content">
                            <i class="ph-bold ph-barbell"></i>
                            <span>Aluno</span>
                        </div>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="reg-role" value="treinador">
                        <div class="radio-content">
                            <i class="ph-bold ph-clipboard-text"></i>
                            <span>Treinador</span>
                        </div>
                    </label>
                </div>
            </div>

            <label class="checkbox-wrapper" style="margin-top:0.25rem;">
                <input type="checkbox" id="reg-terms" required>
                <span class="checkmark"></span>
                <span>Aceito os Termos de Uso e Privacidade</span>
            </label>

            <button type="submit" class="btn-primary" id="signup-submit-btn" style="margin-top: 1rem;">
                <span id="signup-btn-text">Criar Conta</span>
                <span id="signup-btn-spinner" style="display:none; width:16px; height:16px; border:2.5px solid rgba(0,0,0,0.3); border-top-color:#050505; border-radius:50%; animation:spin 0.7s linear infinite; display:none; margin:0 auto;"></span>
            </button>
        </form>

        <p style="font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 1.5rem; line-height: 1.4;">
            Ao criar uma conta, você concorda com nossos <br>
            <a href="#">Termos de Uso</a> e <a href="#">Privacidade</a>.
        </p>
    </div>

    <script>
        function showSignupError(msg) {
            const banner = document.getElementById('signup-error-banner');
            const text   = document.getElementById('signup-error-text');
            if (!banner || !text) return;
            text.textContent = msg;
            banner.style.display = 'flex';
        }

        function hideSignupError() {
            const banner = document.getElementById('signup-error-banner');
            if (banner) banner.style.display = 'none';
        }

        function setSignupLoading(isLoading) {
            const btn  = document.getElementById('signup-submit-btn');
            const text = document.getElementById('signup-btn-text');
            const spin = document.getElementById('signup-btn-spinner');
            if (!btn) return;
            btn.disabled           = isLoading;
            if (text) text.style.display = isLoading ? 'none' : 'inline';
            if (spin) spin.style.display = isLoading ? 'inline-block' : 'none';
        }

        function friendlySignupError(err) {
            if (!err) return 'Não foi possível criar a conta. Tente novamente.';
            const e = err.toLowerCase();
            if (e.includes('already registered') || e.includes('user already exists'))
                return 'Este e-mail já está cadastrado. Tente fazer login.';
            if (e.includes('password') && e.includes('short'))
                return 'A senha deve ter pelo menos 8 caracteres.';
            if (e.includes('password') && e.includes('weak'))
                return 'Senha muito fraca. Use letras, números e símbolos.';
            if (e.includes('invalid email') || e.includes('email format'))
                return 'Endereço de e-mail inválido.';
            if (e.includes('network') || e.includes('fetch'))
                return 'Problema de conexão. Verifique sua internet.';
            return err;
        }

        async function handleProfileCreation() {
            const nome    = document.getElementById('reg-name')?.value?.trim();
            const email   = document.getElementById('reg-email')?.value?.trim();
            const senha   = document.getElementById('reg-pass')?.value;
            const confirm = document.getElementById('reg-pass-confirm')?.value;
            const role    = document.querySelector('input[name="reg-role"]:checked')?.value || 'aluno';

            // ── Validations ──────────────────────────────────────────────
            if (!nome || !email || !senha) {
                showSignupError('Preencha todos os campos obrigatórios.');
                return;
            }
            if (senha !== confirm) {
                showSignupError('As senhas não coincidem. Verifique e tente novamente.');
                return;
            }
            if (senha.length < 8) {
                showSignupError('A senha deve ter pelo menos 8 caracteres.');
                return;
            }

            hideSignupError();
            setSignupLoading(true);

            try {
                // ── 1. Sign Up on Supabase Auth ──────────────────────────
                const { data, error } = await window.supabase.auth.signUp({
                    email,
                    password: senha,
                    options: {
                        emailRedirectTo: window.location.origin,
                        data: { nome, role }   // stored in user_metadata
                    }
                });

                if (error) {
                    showSignupError(friendlySignupError(error.message));
                    return;
                }

                const user = data.user;
                if (!user) {
                    showSignupError('Cadastro não finalizado. Tente novamente.');
                    return;
                }

                // ── 2. Create profile row in 'profiles' table ─────────────
                // Use 'upsert' in case a previous partial signup left a row
                const { error: profileError } = await window.supabase
                    .from('profiles')
                    .upsert({
                        id:     user.id,
                        nome,
                        email,
                        role,
                        status: 'pendente'
                    }, { onConflict: 'id' });

                if (profileError) {
                    // Non-fatal: profile may not exist yet if email isn't confirmed.
                    // Log it but don't block the user.
                    console.warn('Aviso: perfil não inserido imediatamente:', profileError.message);
                }

                // ── 3. Show success state ────────────────────────────────
                const form = document.getElementById('signup-form');
                if (form) form.style.display = 'none';

                const successBanner = document.getElementById('signup-success-banner');
                if (successBanner) successBanner.style.display = 'block';

                console.log('✅ Conta criada! Aguardando confirmação de e-mail.');

            } catch (err) {
                showSignupError('Ocorreu um erro inesperado. Tente mais tarde.');
                console.error('Sign-up error:', err);
            } finally {
                setSignupLoading(false);
            }
        }
    </script>
</div>

<div id="home-screen" class="screen active">
    <section class="home-entry">
        <div class="home-entry-card">
            <div class="home-entry-logo logo-icon glow brand-mark-shell">
                <img src="assets/logo-small.svg" alt="Logo Aplicativo Consultoria" class="brand-mark-img">
            </div>
            <p class="home-entry-kicker">Bem-vindo</p>
            <h1 class="home-entry-title">Aplicativo-Consultoria</h1>
            <p class="home-entry-subtitle">
                Entre na sua conta ou crie um novo acesso para conectar com sua consultoria.
            </p>

            <div class="home-entry-actions">
                <button class="btn-primary home-entry-btn home-entry-btn-primary" onclick="goToGlobalLogin()">
                    Entrar
                </button>
                <button class="btn-secondary home-entry-btn home-entry-btn-secondary" onclick="goToProfileCreate()">
                    Criar conta
                </button>
            </div>

            <button id="install-app-btn" class="btn-secondary-outline install-app-btn"
                style="margin-top: 0.75rem; display: none; width: auto;">
                Instalar Aplicativo
            </button>
        </div>
    </section>
</div>

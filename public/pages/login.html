<div id="global-login-screen" class="screen">
    <div class="gl-login-bg">
        <div class="gl-glow gl-glow-1"></div>
        <div class="gl-glow gl-glow-2"></div>
    </div>

    <div class="gl-card-wrapper">
        <div class="gl-card">
            <div class="gl-header">
                <div class="gl-logo-icon">
                    <i class="ph-bold ph-lightning"></i>
                </div>
                <h1 class="gl-title">Consultoria<span class="gl-title-accent">Fit</span></h1>
                <p class="gl-subtitle">Ola esse e aplicativo-consultoria, faca login para usar</p>
            </div>

            <form class="gl-form" onsubmit="event.preventDefault(); handleEmailLogin();">
                <div class="gl-input-group">
                    <label class="gl-label" for="login-email">E-MAIL</label>
                    <div class="gl-input-wrapper">
                        <i class="ph-bold ph-envelope gl-input-icon"></i>
                        <input type="email" id="login-email" class="gl-input" placeholder="seu@email.com" required autocomplete="email">
                    </div>
                </div>

                <div class="gl-input-group">
                    <label class="gl-label" for="login-pass">SENHA</label>
                    <div class="gl-input-wrapper">
                        <i class="ph-bold ph-lock gl-input-icon"></i>
                        <input type="password" id="login-pass" class="gl-input" placeholder="********" required autocomplete="current-password">
                        <button type="button" class="gl-toggle-pass" onclick="togglePasswordVisibility()" id="toggle-pass-btn" aria-label="Mostrar senha">
                            <i class="ph-bold ph-eye" id="toggle-pass-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="gl-btn-submit" id="login-submit-btn">
                    <span id="login-btn-text">Entrar</span>
                </button>
            </form>

            <div class="gl-divider"><span>OU</span></div>

            <button class="gl-btn-google" onclick="handleGoogleLogin()">
                <i class="ph-bold ph-google-logo"></i>
                Entrar com Google
            </button>

            <button class="gl-btn-google" onclick="resendVerificationEmailFromLogin()">
                <i class="ph-bold ph-envelope-simple"></i>
                Reenviar verificacao de e-mail
            </button>

            <p class="gl-help-text">
                Primeiro acesso: crie a conta, verifique seu e-mail e volte para finalizar o perfil.
            </p>

            <p class="gl-footer-text">
                Nao tem uma conta?
                <a href="#" onclick="goToProfileCreate()" class="gl-footer-link">Criar conta (Treinador / Aluno / Ambos)</a>
            </p>
        </div>
    </div>

    <style>
        #global-login-screen {
            display: none;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            position: relative;
            overflow: hidden;
            z-index: 1000;
        }

        #global-login-screen.active {
            display: flex;
        }

        .gl-login-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .gl-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.18;
        }

        .gl-glow-1 {
            width: 420px;
            height: 420px;
            background: #39ff14;
            top: -80px;
            left: -60px;
        }

        .gl-glow-2 {
            width: 380px;
            height: 380px;
            background: #2a2a2a;
            bottom: -60px;
            right: -60px;
        }

        .gl-card-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
        }

        .gl-card {
            background: rgba(18, 18, 18, 0.72);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .gl-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .gl-logo-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid rgba(57, 255, 20, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .gl-logo-icon i {
            font-size: 2rem;
            color: #39ff14;
        }

        .gl-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            margin: 0;
        }

        .gl-title-accent {
            color: #39ff14;
        }

        .gl-subtitle {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.6);
            margin: 0.5rem 0 0;
        }

        .gl-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .gl-input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .gl-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.4);
        }

        .gl-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .gl-input-icon {
            position: absolute;
            left: 1rem;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1rem;
            pointer-events: none;
        }

        .gl-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        .gl-toggle-pass {
            position: absolute;
            right: 1rem;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .gl-btn-submit {
            width: 100%;
            padding: 0.9rem;
            border-radius: 12px;
            border: none;
            background: #39ff14;
            color: #050505;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .gl-divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.5rem 0;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .gl-divider::before,
        .gl-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .gl-btn-google {
            width: 100%;
            padding: 0.8rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 0.75rem;
        }

        .gl-footer-text {
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 1.5rem;
            margin-bottom: 0;
        }

        .gl-help-text {
            margin: 0.65rem 0 0;
            font-size: 0.78rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.4;
        }

        .gl-footer-link {
            color: #39ff14;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</div>

<div id="global-login-screen" class="screen auth-screen">
    <div class="auth-bg-layer">
        <div class="auth-orb auth-orb-a"></div>
        <div class="auth-orb auth-orb-b"></div>
        <div class="auth-grid"></div>
    </div>

    <button class="btn-back auth-back" onclick="goToHome()">
        <i class="ph-bold ph-arrow-left"></i> Voltar
    </button>

    <section class="auth-shell">
        <article class="auth-card auth-card-login">
            <header class="auth-header">
                <div class="auth-brand-badge"><i class="ph-bold ph-lightning"></i></div>
                <p class="auth-kicker">Aplicativo-Consultoria</p>
                <h1 class="auth-title">Acesse sua conta</h1>
                <p class="auth-subtitle">Login seguro para seguir com seu treino e acompanhamento.</p>
            </header>

            <p id="login-inline-feedback" class="auth-inline-feedback" style="display:none;"></p>

            <form class="auth-form" onsubmit="event.preventDefault(); handleEmailLogin();">
                <div class="auth-field">
                    <i class="ph-bold ph-envelope auth-field-icon"></i>
                    <input type="email" id="login-email" placeholder=" " required autocomplete="email">
                    <label for="login-email">E-mail</label>
                </div>

                <div class="auth-field">
                    <i class="ph-bold ph-lock auth-field-icon"></i>
                    <input type="password" id="login-pass" placeholder=" " required autocomplete="current-password">
                    <label for="login-pass">Senha</label>
                    <button type="button" class="auth-pass-toggle" id="toggle-pass-btn" onclick="togglePasswordVisibility('login-pass', this)" aria-label="Mostrar senha">
                        <i class="ph-bold ph-eye" id="toggle-pass-icon"></i>
                    </button>
                </div>

                <button type="submit" class="btn-primary auth-submit" id="login-submit-btn">
                    <span id="login-btn-text">Entrar</span>
                    <span id="login-btn-spinner" class="auth-btn-spinner" style="display:none;"></span>
                </button>
            </form>

            <div class="auth-divider"><span>ou</span></div>

            <div class="auth-secondary-actions">
                <button class="auth-alt-btn" onclick="handleGoogleLogin()">
                    <i class="ph-bold ph-google-logo"></i>
                    Entrar com Google
                </button>
                <button class="auth-alt-btn" onclick="resendVerificationEmailFromLogin()">
                    <i class="ph-bold ph-envelope-simple"></i>
                    Reenviar verificacao de e-mail
                </button>
            </div>

            <p class="auth-helper">Primeiro acesso: crie a conta, valide o e-mail e finalize o onboarding.</p>

            <p class="auth-footer">
                Nao tem uma conta?
                <a href="#" onclick="goToProfileCreate()">Criar conta (Treinador / Aluno / Ambos)</a>
            </p>
        </article>
    </section>
</div>

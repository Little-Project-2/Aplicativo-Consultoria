<div id="student-questionnaire-screen" class="screen">
            <div class="q-tabs-container">
                <button class="q-tab active" onclick="switchQTab('saude')" id="btn-tab-saude">
                    <i class="ph-bold ph-heart"></i>
                    <span>Saúde</span>
                </button>
                <button class="q-tab" onclick="switchQTab('nutricao')" id="btn-tab-nutricao">
                    <i class="ph-bold ph-apple-logo"></i>
                    <span>Nutrição</span>
                </button>
                <button class="q-tab" onclick="switchQTab('rotina')" id="btn-tab-rotina">
                    <i class="ph-bold ph-moon"></i>
                    <span>Rotina</span>
                </button>
                <button class="q-tab" onclick="switchQTab('treino')" id="btn-tab-treino">
                    <i class="ph-bold ph-barbell"></i>
                    <span>Treino</span>
                </button>
                <button class="q-tab" onclick="switchQTab('metas')" id="btn-tab-metas">
                    <i class="ph-bold ph-target"></i>
                    <span>Metas</span>
                </button>
            </div>

            <div class="q-content-container">
                <form id="questionnaire-form" onsubmit="event.preventDefault(); submitQuestionnaire();">

                    <!-- TAB: SAÚDE -->
                    <div id="q-tab-saude" class="q-tab-content active">
                        <div class="q-header-title">
                            <i class="ph-fill ph-heartbeat"></i>
                            <h3>Saúde & Perfil Basal</h3>
                        </div>

                        <div class="q-field">
                            <label>NOME COMPLETO</label>
                            <input type="text" id="q_nome" class="q-input" placeholder="Ex: João Silva"
                                autocomplete="off" required style="text-transform: capitalize;">
                        </div>

                        <div class="q-grid-2cols">
                            <div class="q-field" style="margin-bottom: 0;">
                                <label>IDADE</label>
                                <input type="number" id="q_idade" class="q-input" placeholder="Ex: 25"
                                    autocomplete="off" required>
                            </div>
                            <div class="q-field" style="margin-bottom: 0;">
                                <label>GÊNERO</label>
                                <select id="q_genero" class="q-input" required>
                                    <option value="" disabled selected>Selecione</option>
                                    <option value="M">Masculino</option>
                                    <option value="F">Feminino</option>
                                </select>
                            </div>
                            <div class="q-field" style="margin-bottom: 0;">
                                <label>PESO (KG)</label>
                                <input type="number" step="0.1" id="q_peso" class="q-input" placeholder="Ex: 70.5"
                                    autocomplete="off" required>
                            </div>
                            <div class="q-field" style="margin-bottom: 0;">
                                <label>ALTURA (CM)</label>
                                <input type="number" id="q_altura" class="q-input" placeholder="Ex: 175"
                                    autocomplete="off" required>
                            </div>
                        </div>


                        <div class="q-field">
                            <label>DOR EM ARTICULAÇÕES AO FAZER ESFORÇO?</label>
                            <div class="segmented-control">
                                <label class="segment-opt"><input type="radio" name="q_dor" value="sim"
                                        onchange="toggleConditional('cond-dor', true)"><span>Sim</span></label>
                                <label class="segment-opt"><input type="radio" name="q_dor" value="nao" checked
                                        onchange="toggleConditional('cond-dor', false)"><span>Não</span></label>
                            </div>
                            <div class="conditional-input" id="cond-dor">
                                <input type="text" class="q-input"
                                    placeholder="Quais articulações? (joelho, ombro, coluna...)" autocomplete="off">
                            </div>
                        </div>

                        <div class="q-field">
                            <label>CONDIÇÕES MÉDICAS</label>
                            <div class="pill-group">
                                <label class="pill"><input type="checkbox" name="q_cond"
                                        value="diabetes"><span>Diabetes</span></label>
                                <label class="pill"><input type="checkbox" name="q_cond"
                                        value="hipertensao"><span>Hipertensão</span></label>
                                <label class="pill"><input type="checkbox" name="q_cond" value="sopro"><span>Sopro
                                        cardíaco</span></label>
                                <label class="pill"><input type="checkbox" name="q_cond"
                                        value="asma"><span>Asma</span></label>
                                <label class="pill"><input type="checkbox" name="q_cond"
                                        value="artrite"><span>Artrite</span></label>
                                <label class="pill"><input type="checkbox" name="q_cond" value="hernia"><span>Hérnia de
                                        disco</span></label>
                            </div>
                        </div>

                        <div class="q-field">
                            <label>USO DE MEDICAMENTOS CONTÍNUOS?</label>
                            <div class="segmented-control">
                                <label class="segment-opt"><input type="radio" name="q_med" value="sim"
                                        onchange="toggleConditional('cond-med', true)"><span>Sim</span></label>
                                <label class="segment-opt"><input type="radio" name="q_med" value="nao" checked
                                        onchange="toggleConditional('cond-med', false)"><span>Não</span></label>
                            </div>
                            <div class="conditional-input" id="cond-med">
                                <input type="text" class="q-input" placeholder="Quais medicamentos?" autocomplete="off">
                            </div>
                        </div>

                        <div class="q-field">
                            <label>JÁ PASSOU POR CIRURGIA?</label>
                            <div class="segmented-control">
                                <label class="segment-opt"><input type="radio" name="q_cirurgia" value="sim"
                                        onchange="toggleConditional('cond-cirurgia', true)"><span>Sim</span></label>
                                <label class="segment-opt"><input type="radio" name="q_cirurgia" value="nao" checked
                                        onchange="toggleConditional('cond-cirurgia', false)"><span>Não</span></label>
                            </div>
                            <div class="conditional-input" id="cond-cirurgia">
                                <input type="text" class="q-input" placeholder="Qual cirurgia e há quanto tempo?"
                                    autocomplete="off">
                            </div>
                        </div>

                        <div class="q-actions right">
                            <button type="button" class="btn-primary q-btn-next"
                                onclick="switchQTab('nutricao')">Proximo <i class="ph-bold ph-caret-right"></i></button>
                        </div>
                    </div>

                    <!-- TAB: NUTRIÇÃO -->
                    <div id="q-tab-nutricao" class="q-tab-content">
                        <div class="q-header-title">
                            <i class="ph-fill ph-apple-logo"></i>
                            <h3>Nutrição</h3>
                        </div>

                        <div class="q-field">
                            <label>RESTRIÇÕES ALIMENTARES</label>
                            <div class="pill-group">
                                <label class="pill"><input type="checkbox" name="q_restr"
                                        value="lactose"><span>Lactose</span></label>
                                <label class="pill"><input type="checkbox" name="q_restr"
                                        value="gluten"><span>Glúten</span></label>
                                <label class="pill"><input type="checkbox" name="q_restr"
                                        value="amendoim"><span>Amendoim</span></label>
                                <label class="pill"><input type="checkbox" name="q_restr"
                                        value="frutos_mar"><span>Frutos do mar</span></label>
                                <label class="pill"><input type="checkbox" name="q_restr"
                                        value="ovo"><span>Ovo</span></label>
                                <label class="pill"><input type="checkbox" name="q_restr"
                                        value="soja"><span>Soja</span></label>
                            </div>
                        </div>

                        <div class="q-field">
                            <label>ALIMENTOS QUE NÃO COME DE JEITO NENHUM</label>
                            <input type="text" class="q-input" placeholder="Ex: brócolis, fígado..." autocomplete="off">
                        </div>

                        <div class="q-field">
                            <label>INTESTINO FUNCIONA REGULARMENTE?</label>
                            <div class="segmented-control">
                                <label class="segment-opt"><input type="radio" name="q_intestino" value="sim"
                                        checked><span>Sim</span></label>
                                <label class="segment-opt"><input type="radio" name="q_intestino"
                                        value="nao"><span>Não</span></label>
                            </div>
                        </div>

                        <div class="q-field">
                            <label>QUANTAS REFEIÇÕES POR DIA (REALISTA)?</label>
                            <div class="pill-group">
                                <label class="pill circle"><input type="radio" name="q_refeicoes"
                                        value="2"><span>2</span></label>
                                <label class="pill circle"><input type="radio" name="q_refeicoes"
                                        value="3"><span>3</span></label>
                                <label class="pill circle"><input type="radio" name="q_refeicoes" value="4"
                                        checked><span>4</span></label>
                                <label class="pill circle"><input type="radio" name="q_refeicoes"
                                        value="5"><span>5</span></label>
                                <label class="pill circle"><input type="radio" name="q_refeicoes"
                                        value="6"><span>6</span></label>
                            </div>
                        </div>

                        <div class="q-actions between">
                            <button type="button" class="btn-secondary q-btn-prev" onclick="switchQTab('saude')"><i
                                    class="ph-bold ph-caret-left"></i> Anterior</button>
                            <button type="button" class="btn-primary q-btn-next" onclick="switchQTab('rotina')">Proximo
                                <i class="ph-bold ph-caret-right"></i></button>
                        </div>
                    </div>

                    <!-- TAB: ROTINA -->
                    <div id="q-tab-rotina" class="q-tab-content">
                        <div class="q-header-title">
                            <i class="ph-fill ph-moon"></i>
                            <h3>Rotina</h3>
                        </div>

                        <div class="q-field">
                            <label>HORAS DE SONO POR NOITE</label>
                            <div class="slider-container">
                                <input type="range" class="q-slider" min="4" max="12" value="7"
                                    oninput="document.getElementById('val-sono').innerText = this.value + 'h'">
                                <span class="slider-val" id="val-sono">7h</span>
                            </div>
                        </div>

                        <div class="q-field">
                            <label>ACORDA DESCANSADO?</label>
                            <div class="segmented-control">
                                <label class="segment-opt"><input type="radio" name="q_descansado" value="sim"
                                        checked><span>Sim</span></label>
                                <label class="segment-opt"><input type="radio" name="q_descansado"
                                        value="nao"><span>Não</span></label>
                            </div>
                        </div>

                        <div class="q-field">
                            <label>NÍVEL DE ESTRESSE (1-10)</label>
                            <div class="slider-container">
                                <input type="range" class="q-slider" min="1" max="10" value="5"
                                    oninput="document.getElementById('val-estresse').innerText = this.value">
                                <span class="slider-val" id="val-estresse">5</span>
                            </div>
                        </div>

                        <div class="q-field">
                            <label>TABAGISMO</label>
                            <div class="segmented-control">
                                <label class="segment-opt"><input type="radio" name="q_fumo" value="nao"
                                        checked><span>Não fuma</span></label>
                                <label class="segment-opt"><input type="radio" name="q_fumo"
                                        value="ocasional"><span>Ocasional</span></label>
                                <label class="segment-opt"><input type="radio" name="q_fumo"
                                        value="diario"><span>Diario</span></label>
                            </div>
                        </div>

                        <div class="q-field">
                            <label>CONSUMO DE ÁLCOOL</label>
                            <div class="segmented-control">
                                <label class="segment-opt"><input type="radio" name="q_alcool" value="nao"
                                        checked><span>Não bebe</span></label>
                                <label class="segment-opt"><input type="radio" name="q_alcool" value="fds"><span>Fim de
                                        semana</span></label>
                                <label class="segment-opt"><input type="radio" name="q_alcool"
                                        value="diario"><span>Diario</span></label>
                            </div>
                        </div>

                        <div class="q-field">
                            <label>ESTILO DE TRABALHO</label>
                            <div class="segmented-control">
                                <label class="segment-opt"><input type="radio" name="q_trab" value="sentado"
                                        checked><span>Sentado</span></label>
                                <label class="segment-opt"><input type="radio" name="q_trab" value="em_pe"><span>Em
                                        pe</span></label>
                                <label class="segment-opt"><input type="radio" name="q_trab"
                                        value="movimento"><span>
                                        Movimento</span></label>
                            </div>
                        </div>

                        <div class="q-actions between">
                            <button type="button" class="btn-secondary q-btn-prev" onclick="switchQTab('nutricao')"><i
                                    class="ph-bold ph-caret-left"></i> Anterior</button>
                            <button type="button" class="btn-primary q-btn-next" onclick="switchQTab('treino')">Proximo
                                <i class="ph-bold ph-caret-right"></i></button>
                        </div>
                    </div>

                    <!-- TAB: TREINO -->
                    <div id="q-tab-treino" class="q-tab-content">
                        <div class="q-header-title">
                            <i class="ph-fill ph-barbell"></i>
                            <h3>Treino</h3>
                        </div>

                        <div class="q-field">
                            <label>TEMPO DE PRATICA DE MUSCULACAO</label>
                            <input type="text" class="q-input" placeholder="Ex: 2 anos, 6 meses, iniciante..."
                                autocomplete="off">
                        </div>

                        <div class="q-field">
                            <label>EXERCÍCIOS QUE AMA FAZER</label>
                            <input type="text" class="q-input" placeholder="Ex: Supino, Agachamento..."
                                autocomplete="off">
                        </div>

                        <div class="q-field">
                            <label>EXERCÍCIOS QUE DETESTA</label>
                            <input type="text" class="q-input" placeholder="Ex: Leg Press, Abdominal..."
                                autocomplete="off">
                        </div>

                        <div class="q-field">
                            <label>DIAS DISPONÍVEIS PARA TREINAR</label>
                            <div class="pill-group">
                                <label class="pill"><input type="checkbox" name="q_dias" value="seg"
                                        checked><span>Segunda</span></label>
                                <label class="pill"><input type="checkbox" name="q_dias"
                                        value="ter"><span>Terça</span></label>
                                <label class="pill"><input type="checkbox" name="q_dias" value="qua"
                                        checked><span>Quarta</span></label>
                                <label class="pill"><input type="checkbox" name="q_dias"
                                        value="qui"><span>Quinta</span></label>
                                <label class="pill"><input type="checkbox" name="q_dias" value="sex"
                                        checked><span>Sexta</span></label>
                                <label class="pill"><input type="checkbox" name="q_dias"
                                        value="sab"><span>Sábado</span></label>
                                <label class="pill"><input type="checkbox" name="q_dias"
                                        value="dom"><span>Domingo</span></label>
                            </div>
                        </div>

                        <div class="q-field">
                            <label>DURAÇÃO DA SESSÃO (MINUTOS)</label>
                            <div class="segmented-control">
                                <label class="segment-opt"><input type="radio" name="q_duracao"
                                        value="30"><span>30'</span></label>
                                <label class="segment-opt"><input type="radio" name="q_duracao"
                                        value="45"><span>45'</span></label>
                                <label class="segment-opt"><input type="radio" name="q_duracao" value="60"
                                        checked><span>60'</span></label>
                                <label class="segment-opt"><input type="radio" name="q_duracao"
                                        value="75"><span>75'</span></label>
                                <label class="segment-opt"><input type="radio" name="q_duracao"
                                        value="90"><span>90'</span></label>
                            </div>
                        </div>

                        <div class="q-actions between">
                            <button type="button" class="btn-secondary q-btn-prev" onclick="switchQTab('rotina')"><i
                                    class="ph-bold ph-caret-left"></i> Anterior</button>
                            <button type="button" class="btn-primary q-btn-next" onclick="switchQTab('metas')">Proximo
                                <i class="ph-bold ph-caret-right"></i></button>
                        </div>
                    </div>

                    <!-- TAB: METAS -->
                    <div id="q-tab-metas" class="q-tab-content">
                        <div class="q-header-title">
                            <i class="ph-fill ph-target"></i>
                            <h3>Metas</h3>
                        </div>

                        <div class="q-field">
                            <label>O QUE MAIS TE INCOMODA NO CORPO HOJE?</label>
                            <textarea class="q-input" rows="2"
                                placeholder="Ex: barriga, braços finos, postura..."></textarea>
                        </div>

                        <div class="q-field">
                            <label>QUAL SEU OBJETIVO EM 3 MESES?</label>
                            <textarea class="q-input" id="q_objetivo" rows="2"
                                placeholder="Ex: perder 5kg, ganhar massa, definir..."></textarea>
                        </div>

                        <div class="q-field">
                            <label>JÁ FEZ CONSULTORIA ANTES? O QUE GOSTOU/ODIOU?</label>
                            <textarea class="q-input" rows="2"
                                placeholder="Ex: Sim, mas o treinador nunca mudava o treino..."></textarea>
                        </div>

                        <div class="q-actions between">
                            <button type="button" class="btn-secondary q-btn-prev" onclick="switchQTab('treino')"><i
                                    class="ph-bold ph-caret-left"></i> Anterior</button>
                            <div style="display: flex; gap: 1rem;">
                                <button type="button" class="btn-secondary"><i class="ph-bold ph-copy"></i>
                                    Copiar</button>
                                <button type="submit" class="btn-primary" style="width: auto; padding: 1rem 2rem;"><i
                                        class="ph-bold ph-floppy-disk"></i> Salvar</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
